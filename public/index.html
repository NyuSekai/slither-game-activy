<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activy's Slither.IO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: default;
  }
  canvas { display: block; }

  /* ── Menu overlay ──────────────────────────────── */
  #menu {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a1a;
    z-index: 100;
    gap: 16px;
    transition: opacity 0.3s;
    overflow: hidden;
    cursor: default;
  }
  #menu.hidden { display: none; }

  /* Activy logo */
  #activy-logo {
    width: 220px;
    margin-bottom: -4px;
  }

  /* Game subtitle */
  #menu h1 {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: -8px;
  }
  #menu h1 span { color: #5DBE77; }
  #menu p.sub { color: #8888aa; font-size: 14px; margin-top: -8px; }
  #nameInput {
    padding: 14px 24px;
    font-size: 20px;
    border: 2px solid #2a2a3a;
    border-radius: 30px;
    background: #14142a;
    color: #fff;
    text-align: center;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  #nameInput:focus { border-color: #5DBE77; }
  #playBtn {
    padding: 14px 48px;
    font-size: 20px;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    background: #5DBE77;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  #playBtn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(93,190,119,0.4); }
  #controls-hint {
    color: #555; font-size: 12px; margin-top: 6px;
  }

  /* ── Decorative snakes on menu ────────────────── */
  .menu-snake {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }
  .menu-snake.left {
    left: -30px;
    top: 50%;
    transform: translateY(-50%);
  }
  .menu-snake.right {
    right: -30px;
    top: 50%;
    transform: translateY(-50%) scaleX(-1);
  }
  #menu > *:not(.menu-snake) {
    position: relative;
    z-index: 1;
  }

  /* floating animation for snakes */
  @keyframes floatSnake {
    0%, 100% { transform: translateY(-50%) translateX(0px); }
    50% { transform: translateY(-50%) translateX(15px); }
  }
  @keyframes floatSnakeR {
    0%, 100% { transform: translateY(-50%) scaleX(-1) translateX(0px); }
    50% { transform: translateY(-50%) scaleX(-1) translateX(15px); }
  }
  .menu-snake.left { animation: floatSnake 4s ease-in-out infinite; }
  .menu-snake.right { animation: floatSnakeR 4s ease-in-out infinite; }

  /* ── HUD ───────────────────────────────────────── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    pointer-events: none; z-index: 50;
  }
  #scoreboard {
    position: fixed; top: 12px; right: 12px;
    background: rgba(10,10,30,0.75);
    border: 1px solid #222;
    border-radius: 10px;
    padding: 10px 16px;
    color: #ccc;
    font-size: 13px;
    min-width: 160px;
    backdrop-filter: blur(6px);
  }
  #scoreboard h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 6px;
  }
  .lb-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .lb-row.me { color: #ffa502; font-weight: 700; }
  #myScore {
    position: fixed; top: 12px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  #playerCount {
    position: fixed; bottom: 12px; left: 12px;
    color: #555; font-size: 12px;
  }
  #minimap {
    position: fixed; bottom: 12px; right: 12px;
    width: 140px; height: 140px;
    background: rgba(10,10,30,0.6);
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }
  #minimapCanvas { width: 100%; height: 100%; }

  /* ── Death screen ──────────────────────────────── */
  #deathScreen {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,5,15,0.85);
    z-index: 90; gap: 12px;
  }
  #deathScreen.show { display: flex; }
  #deathScreen h2 { color: #ff4757; font-size: 36px; }
  #deathScreen p { color: #aaa; font-size: 16px; }
  #deathScreen .final-score { color: #ffa502; font-size: 48px; font-weight: 900; }
  #livesInfo { color: #ff6b81; font-size: 18px; font-weight: 600; }
  #respawnBtn {
    padding: 12px 40px; font-size: 18px; font-weight: 700;
    border: none; border-radius: 30px;
    background: #5DBE77;
    color: #fff; cursor: pointer; margin-top: 10px;
    transition: transform 0.15s;
  }
  #respawnBtn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(93,190,119,0.4); }
  #respawnBtn.hidden { display: none; }

  /* ── Spectator banner ─────────────────────────── */
  #spectatorBanner {
    position: fixed; top: 50px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,70,87,0.15);
    border: 1px solid rgba(255,70,87,0.3);
    border-radius: 8px;
    padding: 8px 20px;
    color: #ff6b81;
    font-size: 14px;
    font-weight: 600;
    z-index: 60;
    display: none;
    backdrop-filter: blur(6px);
  }
  #spectatorBanner.show { display: block; }

  /* ── Lives HUD ────────────────────────────────── */
  #livesHud {
    position: fixed; top: 40px; left: 50%;
    transform: translateX(-50%);
    color: #ff6b81;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Menu -->
<div id="menu">

  <!-- Decorative snake LEFT (green - Activy brand) -->
  <svg class="menu-snake left" width="200" height="400" viewBox="0 0 200 400">
    <!-- Body -->
    <path d="M160,40 C180,60 170,100 140,120 C110,140 100,170 120,200 C140,230 130,260 100,280 C70,300 80,340 110,360" stroke="#5DBE77" stroke-width="32" stroke-linecap="round" fill="none"/>
    <!-- Stripe pattern -->
    <path d="M160,40 C180,60 170,100 140,120 C110,140 100,170 120,200 C140,230 130,260 100,280 C70,300 80,340 110,360" stroke="#4AA866" stroke-width="20" stroke-linecap="round" fill="none" stroke-dasharray="25 25" stroke-dashoffset="10"/>
    <!-- Head -->
    <circle cx="155" cy="38" r="22" fill="#5DBE77"/>
    <circle cx="155" cy="38" r="18" fill="#4AA866"/>
    <!-- Eyes -->
    <circle cx="148" cy="30" r="6" fill="white"/>
    <circle cx="164" cy="30" r="6" fill="white"/>
    <circle cx="149" cy="29" r="3" fill="#111"/>
    <circle cx="165" cy="29" r="3" fill="#111"/>
    <!-- Tongue -->
    <path d="M156,50 L156,62 L150,68 M156,62 L162,68" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </svg>

  <!-- Decorative snake RIGHT (purple - Activy accent) -->
  <svg class="menu-snake right" width="200" height="400" viewBox="0 0 200 400">
    <!-- Body -->
    <path d="M160,360 C180,340 170,300 140,280 C110,260 100,230 120,200 C140,170 130,140 100,120 C70,100 80,60 110,40" stroke="#9A40F6" stroke-width="32" stroke-linecap="round" fill="none"/>
    <!-- Stripe pattern -->
    <path d="M160,360 C180,340 170,300 140,280 C110,260 100,230 120,200 C140,170 130,140 100,120 C70,100 80,60 110,40" stroke="#7B2ED6" stroke-width="20" stroke-linecap="round" fill="none" stroke-dasharray="25 25" stroke-dashoffset="5"/>
    <!-- Head -->
    <circle cx="112" cy="38" r="22" fill="#9A40F6"/>
    <circle cx="112" cy="38" r="18" fill="#7B2ED6"/>
    <!-- Eyes -->
    <circle cx="104" cy="30" r="6" fill="white"/>
    <circle cx="120" cy="30" r="6" fill="white"/>
    <circle cx="105" cy="29" r="3" fill="#111"/>
    <circle cx="121" cy="29" r="3" fill="#111"/>
    <!-- Tongue -->
    <path d="M112,50 L112,62 L106,68 M112,62 L118,68" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </svg>

  <!-- Activy Logo (inline SVG matching brand) -->
  <svg id="activy-logo" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Brush-style "Activy" text -->
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5DBE77"/>
        <stop offset="100%" stop-color="#4AA866"/>
      </linearGradient>
    </defs>
    <text x="200" y="78" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="80" font-style="italic" fill="url(#logoGrad)">Activy</text>
    <!-- Swoosh underline -->
    <path d="M80,92 Q200,108 340,88" stroke="#5DBE77" stroke-width="5" stroke-linecap="round" fill="none"/>
  </svg>

  <h1><span>SLITHER</span>.IO</h1>
  <p class="sub">Multiplayer Snake Game</p>
  <input id="nameInput" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
  <button id="playBtn">PLAY</button>
  <p id="controls-hint">Mouse or Arrow Keys to steer &bull; Space to boost</p>
</div>

<!-- Death screen -->
<div id="deathScreen">
  <h2 id="deathTitle">YOU DIED</h2>
  <p id="deathMsg"></p>
  <div class="final-score" id="finalScore">0</div>
  <p id="livesInfo"></p>
  <button id="respawnBtn">PLAY AGAIN</button>
</div>

<!-- Spectator banner -->
<div id="spectatorBanner">SPECTATING — You have been eliminated</div>

<!-- Game canvas -->
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="myScore">0</div>
  <div id="livesHud"></div>
  <div id="scoreboard">
    <h3>Leaderboard</h3>
    <div id="lbBody"></div>
  </div>
  <div id="playerCount"></div>
  <div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  // ── Elements ──────────────────────────────────────────────
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const mmCanvas = document.getElementById('minimapCanvas');
  const mmCtx    = mmCanvas.getContext('2d');
  const menu    = document.getElementById('menu');
  const nameInput = document.getElementById('nameInput');
  const playBtn = document.getElementById('playBtn');
  const deathScreen = document.getElementById('deathScreen');
  const deathTitle = document.getElementById('deathTitle');
  const deathMsg = document.getElementById('deathMsg');
  const finalScoreEl = document.getElementById('finalScore');
  const livesInfo = document.getElementById('livesInfo');
  const respawnBtn = document.getElementById('respawnBtn');
  const myScoreEl = document.getElementById('myScore');
  const livesHud = document.getElementById('livesHud');
  const lbBody  = document.getElementById('lbBody');
  const playerCountEl = document.getElementById('playerCount');
  const spectatorBanner = document.getElementById('spectatorBanner');

  // ── State ─────────────────────────────────────────────────
  let socket = null;
  let myId = null;
  let worldW = 4000, worldH = 4000;
  let state = { players: {}, food: [], leaderboard: [] };
  let camera = { x: 0, y: 0 };
  let mouseAngle = 0;
  let boosting = false;
  let playing = false;
  let lastScore = 0;
  let spectating = false;
  let myLives = 2;
  let spectateTarget = null;

  // ── Resize ────────────────────────────────────────────────
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Connect ───────────────────────────────────────────────
  function connect() {
    socket = io();

    socket.on('joined', (data) => {
      myId = data.id;
      worldW = data.worldW;
      worldH = data.worldH;
      menu.classList.add('hidden');
      deathScreen.classList.remove('show');
      playing = true;
    });

    socket.on('state', (s) => {
      // Decode compressed format from server
      if (s.worldW) worldW = s.worldW;
      if (s.worldH) worldH = s.worldH;

      // Decode players: short keys -> full keys, arrays -> objects
      const decoded = {};
      for (const [id, p] of Object.entries(s.players)) {
        const segs = p.s.map(seg => Array.isArray(seg) ? { x: seg[0], y: seg[1] } : seg);
        decoded[id] = {
          id: p.id,
          name: p.n,
          segments: segs,
          score: p.sc,
          hue: p.h,
          boosting: p.b,
          lives: p.l
        };
      }

      // Decode food: short keys -> full keys
      const decodedFood = s.food.map(f => ({
        x: f.x, y: f.y, color: f.c, value: f.v
      }));

      // Decode leaderboard
      const decodedLb = (s.leaderboard || []).map(e => ({
        name: e.n, score: e.sc
      }));

      state = {
        players: decoded,
        food: decodedFood,
        leaderboard: decodedLb
      };
    });

    socket.on('dead', (data) => {
      playing = false;
      deathMsg.textContent = data.killer ? `Killed by ${data.killer}` : 'You died!';
      finalScoreEl.textContent = lastScore;

      if (data.eliminated) {
        // No more lives — spectator mode
        myLives = 0;
        deathTitle.textContent = 'ELIMINATED';
        livesInfo.textContent = 'No lives remaining';
        respawnBtn.classList.add('hidden');
        deathScreen.classList.add('show');
        setTimeout(() => {
          deathScreen.classList.remove('show');
          spectating = true;
          spectatorBanner.classList.add('show');
          livesHud.textContent = '';
        }, 3000);
      } else {
        // Still have lives left
        myLives = data.livesLeft;
        deathTitle.textContent = 'YOU DIED';
        livesInfo.textContent = `${data.livesLeft} life remaining`;
        respawnBtn.classList.remove('hidden');
        deathScreen.classList.add('show');
      }
    });

    socket.on('eliminated', () => {
      // Tried to respawn but already out of lives
      spectating = true;
      spectatorBanner.classList.add('show');
      deathScreen.classList.remove('show');
    });

    socket.on('full', () => {
      alert('Server is full! Try again later.');
    });
  }

  // ── Menu actions ──────────────────────────────────────────
  playBtn.addEventListener('click', startGame);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });
  respawnBtn.addEventListener('click', () => {
    socket.emit('respawn', { name: nameInput.value || 'Player' });
  });

  function startGame() {
    if (!socket) connect();
    socket.emit('join', { name: nameInput.value || 'Player' });
  }

  // ── Input (classic slither.io style) ──────────────────────
  const TURN_SPEED = 0.14;
  let keysDown = {};

  // Helper: check if user is typing in a text input
  function isTyping() {
    const el = document.activeElement;
    return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
  }

  // Mouse: cursor is always visible, snake aims toward it
  // This is exactly how slither.io works
  window.addEventListener('mousemove', (e) => {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    mouseAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (isTyping()) return;
    keysDown[e.code] = true;
    if (e.code === 'Space') { boosting = true; e.preventDefault(); }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' ||
        e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
        e.code === 'KeyA' || e.code === 'KeyD') {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (isTyping()) return;
    keysDown[e.code] = false;
    if (e.code === 'Space') boosting = false;
  });

  // send input to server
  setInterval(() => {
    // Keyboard turning overrides mouse when arrow keys are held
    if (keysDown['ArrowLeft'] || keysDown['KeyA']) mouseAngle -= TURN_SPEED;
    if (keysDown['ArrowRight'] || keysDown['KeyD']) mouseAngle += TURN_SPEED;

    if (socket && playing) {
      socket.emit('input', { angle: mouseAngle, boosting });
    }
  }, 1000 / 30);

  // ── Drawing helpers ───────────────────────────────────────
  function worldToScreen(wx, wy) {
    return { x: wx - camera.x + canvas.width / 2, y: wy - camera.y + canvas.height / 2 };
  }

  // ── Pre-computed values for performance ────────────────────
  const PI2 = Math.PI * 2;
  const halfW = () => canvas.width / 2;
  const halfH = () => canvas.height / 2;

  // Cache HSL color strings to avoid generating them every frame
  const colorCache = {};
  function hsl(h, s, l) {
    const key = (h | 0) * 10000 + (s | 0) * 100 + (l | 0);
    if (!colorCache[key]) colorCache[key] = `hsl(${h},${s}%,${l}%)`;
    return colorCache[key];
  }

  function drawGrid() {
    const gridSize = 60;
    const camX = camera.x, camY = camera.y;
    const w = canvas.width, h = canvas.height;
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    // Batch all grid lines into one path
    ctx.beginPath();
    const sx = -(camX % gridSize);
    const sy = -(camY % gridSize);
    for (let x = sx; x < w; x += gridSize) {
      ctx.moveTo(x, 0); ctx.lineTo(x, h);
    }
    for (let y = sy; y < h; y += gridSize) {
      ctx.moveTo(0, y); ctx.lineTo(w, y);
    }
    ctx.stroke();
  }

  function drawBorder() {
    ctx.strokeStyle = 'rgba(255,50,50,0.4)';
    ctx.lineWidth = 4;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    ctx.strokeRect(ox, oy, worldW, worldH);
  }

  function drawFood() {
    const w = canvas.width, h = canvas.height;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    // Group food by color to minimize fillStyle changes
    const byColor = {};
    for (let i = 0; i < state.food.length; i++) {
      const f = state.food[i];
      const sx = f.x + ox;
      const sy = f.y + oy;
      if (sx < -10 || sx > w + 10 || sy < -10 || sy > h + 10) continue;
      if (!byColor[f.color]) byColor[f.color] = [];
      byColor[f.color].push(sx, sy, f.value > 1 ? 5 : 3);
    }
    for (const color in byColor) {
      ctx.fillStyle = color;
      ctx.beginPath();
      const arr = byColor[color];
      for (let i = 0; i < arr.length; i += 3) {
        ctx.moveTo(arr[i] + arr[i + 2], arr[i + 1]);
        ctx.arc(arr[i], arr[i + 1], arr[i + 2], 0, PI2);
      }
      ctx.fill();
    }
  }

  function drawSnake(p, isMe) {
    const segments = p.segments;
    if (!segments || segments.length < 2) return;
    const radius = 10 + Math.sqrt(p.score) * 1.2;
    const w = canvas.width, h = canvas.height;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    const sat = p.boosting ? 100 : 75;
    const hue = p.hue;
    const hue2 = (hue + 30) % 360;
    const len = segments.length;
    const invLen = 1 / len;

    // Draw body — batch segments by color (main + stripe)
    // Main body pass
    ctx.beginPath();
    let lastColor = '';
    for (let i = len - 1; i >= 0; i--) {
      const sx = segments[i].x + ox;
      const sy = segments[i].y + oy;
      if (sx < -radius * 2 || sx > w + radius * 2 ||
          sy < -radius * 2 || sy > h + radius * 2) continue;
      const t = 1 - i * invLen;
      const r = radius * (0.5 + t * 0.5);
      const light = 50 + t * 15;
      const c = hsl(hue, sat, light);
      if (c !== lastColor) {
        if (lastColor) ctx.fill();
        ctx.fillStyle = c;
        ctx.beginPath();
        lastColor = c;
      }
      ctx.moveTo(sx + r, sy);
      ctx.arc(sx, sy, r, 0, PI2);
    }
    ctx.fill();

    // Stripe pass (every other group of 3)
    ctx.beginPath();
    lastColor = '';
    for (let i = len - 1; i >= 0; i--) {
      if (i % 6 >= 3) continue;
      const sx = segments[i].x + ox;
      const sy = segments[i].y + oy;
      if (sx < -radius * 2 || sx > w + radius * 2 ||
          sy < -radius * 2 || sy > h + radius * 2) continue;
      const t = 1 - i * invLen;
      const r = radius * (0.5 + t * 0.5) * 0.7;
      const light = 60 + t * 15;
      const c = hsl(hue2, sat, light);
      if (c !== lastColor) {
        if (lastColor) ctx.fill();
        ctx.fillStyle = c;
        ctx.beginPath();
        lastColor = c;
      }
      ctx.moveTo(sx + r, sy);
      ctx.arc(sx, sy, r, 0, PI2);
    }
    ctx.fill();

    // Eyes on head
    const hx = segments[0].x + ox;
    const hy = segments[0].y + oy;
    const angle = Math.atan2(segments[0].y - segments[1].y, segments[0].x - segments[1].x);
    const eo = radius * 0.4;
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const ex1 = hx + Math.cos(angle - 0.5) * eo;
    const ey1 = hy + Math.sin(angle - 0.5) * eo;
    const ex2 = hx + Math.cos(angle + 0.5) * eo;
    const ey2 = hy + Math.sin(angle + 0.5) * eo;
    ctx.moveTo(ex1 + radius * 0.25, ey1);
    ctx.arc(ex1, ey1, radius * 0.25, 0, PI2);
    ctx.moveTo(ex2 + radius * 0.25, ey2);
    ctx.arc(ex2, ey2, radius * 0.25, 0, PI2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    const po = radius * 0.08;
    ctx.arc(ex1 + cosA * po, ey1 + sinA * po, radius * 0.13, 0, PI2);
    ctx.moveTo(ex2 + cosA * po + radius * 0.13, ey2 + sinA * po);
    ctx.arc(ex2 + cosA * po, ey2 + sinA * po, radius * 0.13, 0, PI2);
    ctx.fill();

    // Name tag
    ctx.font = '600 13px "Segoe UI",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = isMe ? '#ffa502' : 'rgba(255,255,255,0.7)';
    ctx.fillText(p.name, hx, hy - radius - 14);
  }

  // Minimap: only redraw every 3rd frame
  let mmFrame = 0;
  function drawMinimap() {
    mmFrame++;
    if (mmFrame % 3 !== 0) return;
    mmCtx.clearRect(0, 0, 140, 140);
    mmCtx.fillStyle = 'rgba(10,10,30,0.4)';
    mmCtx.fillRect(0, 0, 140, 140);
    mmCtx.strokeStyle = 'rgba(255,50,50,0.3)';
    mmCtx.strokeRect(0, 0, 140, 140);

    // players only (skip food on minimap — saves cycles)
    for (const p of Object.values(state.players)) {
      if (!p.segments || !p.segments.length) continue;
      const mx = p.segments[0].x / worldW * 140;
      const my = p.segments[0].y / worldH * 140;
      mmCtx.beginPath();
      mmCtx.arc(mx, my, p.id === myId ? 3 : 2, 0, PI2);
      mmCtx.fillStyle = p.id === myId ? '#ffa502' : hsl(p.hue, 70, 60);
      mmCtx.fill();
    }
  }

  function updateHUD() {
    const me = state.players[myId];
    if (me) {
      lastScore = me.score;
      myScoreEl.textContent = `Score: ${me.score}`;
      livesHud.textContent = `Lives: ${'♥'.repeat(me.lives || 0)}${'♡'.repeat(2 - (me.lives || 0))}`;
    } else if (spectating) {
      myScoreEl.textContent = '';
      livesHud.textContent = '';
    }

    // leaderboard
    let html = '';
    (state.leaderboard || []).forEach((entry, i) => {
      const isMe = me && entry.name === me.name && entry.score === me.score;
      html += `<div class="lb-row${isMe ? ' me' : ''}">`
            + `<span>${i + 1}. ${entry.name}</span><span>${entry.score}</span></div>`;
    });
    lbBody.innerHTML = html;

    // player count
    const count = Object.keys(state.players).length;
    playerCountEl.textContent = `${count} player${count !== 1 ? 's' : ''} online`;
  }

  // ── Main render loop ─────────────────────────────────────
  let frameCount = 0;
  function render() {
    frameCount++;

    // Background (fillRect is faster than clearRect + fillRect)
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Camera follow — own snake or leader when spectating
    let camTarget = state.players[myId];
    if (!camTarget && spectating) {
      const ids = Object.keys(state.players);
      if (ids.length > 0) {
        let best = state.players[ids[0]];
        for (const id of ids) {
          if (state.players[id].score > best.score) best = state.players[id];
        }
        camTarget = best;
      }
    }
    if (camTarget && camTarget.segments && camTarget.segments.length > 0) {
      camera.x += (camTarget.segments[0].x - camera.x) * 0.12;
      camera.y += (camTarget.segments[0].y - camera.y) * 0.12;
    }

    drawGrid();
    drawBorder();
    drawFood();

    // Draw other snakes first, then me on top
    for (const p of Object.values(state.players)) {
      if (p.id !== myId) drawSnake(p, false);
    }
    if (state.players[myId]) drawSnake(state.players[myId], true);

    drawMinimap();
    // Update HUD text only every 5th frame (DOM updates are slow)
    if (frameCount % 5 === 0) updateHUD();

    requestAnimationFrame(render);
  }
  render();

  // Focus name input
  nameInput.focus();
})();
</script>
</body>
</html>
