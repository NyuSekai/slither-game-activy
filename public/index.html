<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activy's Slither.IO</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: default;
  }
  canvas { display: block; }

  /* ── Menu overlay ──────────────────────────────── */
  #menu {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a1a;
    z-index: 100;
    gap: 16px;
    transition: opacity 0.3s;
    overflow: hidden;
    cursor: default;
  }
  #menu.hidden { display: none; }

  /* Banner image */
  #banner-img {
    width: 420px;
    max-width: 90vw;
    border-radius: 16px;
    margin-bottom: 8px;
  }
  #nameInput {
    padding: 14px 24px;
    font-size: 20px;
    border: 2px solid #2a2a3a;
    border-radius: 30px;
    background: #14142a;
    color: #fff;
    text-align: center;
    width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }
  #nameInput:focus { border-color: #5DBE77; }
  #playBtn {
    padding: 14px 48px;
    font-size: 20px;
    font-weight: 700;
    border: none;
    border-radius: 30px;
    background: #5DBE77;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  #playBtn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(93,190,119,0.4); }
  #controls-hint {
    color: #555; font-size: 12px; margin-top: 6px;
  }

  /* ── Podium / Winner screen ────────────────────── */
  #podiumScreen {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,26,0.95);
    z-index: 110; gap: 10px;
  }
  #podiumScreen.show { display: flex; }
  #podiumScreen h2 {
    font-size: 42px; font-weight: 900; color: #5DBE77;
    letter-spacing: 3px; margin-bottom: 10px;
  }
  #podium {
    display: flex; align-items: flex-end; gap: 16px;
    margin-bottom: 16px;
  }
  .podium-place {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .podium-crown { font-size: 36px; margin-bottom: -4px; }
  .podium-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid #333;
  }
  .first .podium-avatar { width: 72px; height: 72px; border-color: #ffd700; }
  .second .podium-avatar { border-color: #c0c0c0; }
  .third .podium-avatar { border-color: #cd7f32; }
  .podium-name {
    color: #fff; font-size: 16px; font-weight: 700;
    max-width: 120px; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .podium-score { color: #aaa; font-size: 14px; }
  .podium-bar {
    width: 100px; text-align: center;
    color: #fff; font-weight: 800; font-size: 18px;
    border-radius: 8px 8px 0 0;
    padding-top: 10px;
  }
  .first .podium-bar {
    height: 140px; background: linear-gradient(180deg, #ffd700, #b8960f);
  }
  .second .podium-bar {
    height: 100px; background: linear-gradient(180deg, #c0c0c0, #888);
  }
  .third .podium-bar {
    height: 70px; background: linear-gradient(180deg, #cd7f32, #8a5520);
  }
  #podiumSub { color: #888; font-size: 14px; margin-top: 6px; }

  /* ── HUD ───────────────────────────────────────── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    pointer-events: none; z-index: 50;
  }
  #scoreboard {
    position: fixed; top: 12px; right: 12px;
    background: rgba(10,10,30,0.75);
    border: 1px solid #222;
    border-radius: 10px;
    padding: 10px 16px;
    color: #ccc;
    font-size: 13px;
    min-width: 160px;
    backdrop-filter: blur(6px);
  }
  #scoreboard h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 6px;
  }
  .lb-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .lb-row.me { color: #ffa502; font-weight: 700; }
  #myScore {
    position: fixed; top: 12px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  #timerHud {
    position: fixed; top: 12px; left: 12px;
    color: #5DBE77; font-size: 18px; font-weight: 700;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  #timerHud.warning { color: #ff4757; }
  #playerCount {
    position: fixed; bottom: 12px; left: 12px;
    color: #555; font-size: 12px;
  }
  #minimap {
    position: fixed; bottom: 12px; right: 12px;
    width: 140px; height: 140px;
    background: rgba(10,10,30,0.6);
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }
  #minimapCanvas { width: 100%; height: 100%; }

  /* ── Death screen ──────────────────────────────── */
  #deathScreen {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,5,15,0.85);
    z-index: 90; gap: 12px;
  }
  #deathScreen.show { display: flex; }
  #deathScreen h2 { color: #ff4757; font-size: 36px; }
  #deathScreen p { color: #aaa; font-size: 16px; }
  #deathScreen .final-score { color: #ffa502; font-size: 48px; font-weight: 900; }
  #livesInfo { color: #ff6b81; font-size: 18px; font-weight: 600; }
  #respawnBtn {
    padding: 12px 40px; font-size: 18px; font-weight: 700;
    border: none; border-radius: 30px;
    background: #5DBE77;
    color: #fff; cursor: pointer; margin-top: 10px;
    transition: transform 0.15s;
  }
  #respawnBtn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(93,190,119,0.4); }
  #respawnBtn.hidden { display: none; }

  /* ── Spectator banner ─────────────────────────── */
  #spectatorBanner {
    position: fixed; top: 50px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,70,87,0.15);
    border: 1px solid rgba(255,70,87,0.3);
    border-radius: 8px;
    padding: 8px 20px;
    color: #ff6b81;
    font-size: 14px;
    font-weight: 600;
    z-index: 60;
    display: none;
    backdrop-filter: blur(6px);
  }
  #spectatorBanner.show { display: block; }

  /* ── Lives HUD ────────────────────────────────── */
  #livesHud {
    position: fixed; top: 40px; left: 50%;
    transform: translateX(-50%);
    color: #ff6b81;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>

<!-- Menu -->
<div id="menu">

  <!-- Banner image -->
  <img id="banner-img" src="/banner.svg" alt="Activy Slither IO" />
  <input id="nameInput" type="text" placeholder="Your name" maxlength="16" autocomplete="off" />
  <button id="playBtn">PLAY</button>
  <p id="controls-hint">Mouse or Arrow Keys to steer &bull; Space to boost</p>
</div>

<!-- Death screen -->
<div id="deathScreen">
  <h2 id="deathTitle">YOU DIED</h2>
  <p id="deathMsg"></p>
  <div class="final-score" id="finalScore">0</div>
  <p id="livesInfo"></p>
  <button id="respawnBtn">PLAY AGAIN</button>
</div>

<!-- Winner / Podium screen -->
<div id="podiumScreen">
  <h2>GAME OVER</h2>
  <div id="podium">
    <div class="podium-place second">
      <div class="podium-avatar" id="p2avatar"></div>
      <div class="podium-name" id="p2name">---</div>
      <div class="podium-score" id="p2score">0</div>
      <div class="podium-bar">2nd</div>
    </div>
    <div class="podium-place first">
      <div class="podium-crown">&#x1F451;</div>
      <div class="podium-avatar" id="p1avatar"></div>
      <div class="podium-name" id="p1name">---</div>
      <div class="podium-score" id="p1score">0</div>
      <div class="podium-bar">1st</div>
    </div>
    <div class="podium-place third">
      <div class="podium-avatar" id="p3avatar"></div>
      <div class="podium-name" id="p3name">---</div>
      <div class="podium-score" id="p3score">0</div>
      <div class="podium-bar">3rd</div>
    </div>
  </div>
  <p id="podiumSub">Thanks for playing!</p>
</div>

<!-- Spectator banner -->
<div id="spectatorBanner">SPECTATING — You have been eliminated</div>

<!-- Game canvas -->
<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="myScore">0</div>
  <div id="livesHud"></div>
  <div id="scoreboard">
    <h3>Leaderboard</h3>
    <div id="lbBody"></div>
  </div>
  <div id="timerHud"></div>
  <div id="playerCount"></div>
  <div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(() => {
  // ── Elements ──────────────────────────────────────────────
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const mmCanvas = document.getElementById('minimapCanvas');
  const mmCtx    = mmCanvas.getContext('2d');
  const menu    = document.getElementById('menu');
  const nameInput = document.getElementById('nameInput');
  const playBtn = document.getElementById('playBtn');
  const deathScreen = document.getElementById('deathScreen');
  const deathTitle = document.getElementById('deathTitle');
  const deathMsg = document.getElementById('deathMsg');
  const finalScoreEl = document.getElementById('finalScore');
  const livesInfo = document.getElementById('livesInfo');
  const respawnBtn = document.getElementById('respawnBtn');
  const myScoreEl = document.getElementById('myScore');
  const livesHud = document.getElementById('livesHud');
  const lbBody  = document.getElementById('lbBody');
  const podiumScreen = document.getElementById('podiumScreen');
  const p1name = document.getElementById('p1name');
  const p1score = document.getElementById('p1score');
  const p1avatar = document.getElementById('p1avatar');
  const p2name = document.getElementById('p2name');
  const p2score = document.getElementById('p2score');
  const p2avatar = document.getElementById('p2avatar');
  const p3name = document.getElementById('p3name');
  const p3score = document.getElementById('p3score');
  const p3avatar = document.getElementById('p3avatar');
  const playerCountEl = document.getElementById('playerCount');
  const timerHud = document.getElementById('timerHud');
  const spectatorBanner = document.getElementById('spectatorBanner');

  // ── State ─────────────────────────────────────────────────
  let socket = null;
  let myId = null;
  let worldW = 4000, worldH = 4000;
  let state = { players: {}, food: [], leaderboard: [] };
  let prevState = { players: {} };  // previous server snapshot
  let stateTime = 0;               // when current state arrived
  let prevStateTime = 0;            // when previous state arrived
  let renderPlayers = {};           // interpolated player data for rendering
  let camera = { x: 0, y: 0 };
  let mouseAngle = 0;
  let boosting = false;
  let playing = false;
  let lastScore = 0;
  let spectating = false;
  let myLives = 2;
  let spectateTarget = null;

  // ── Resize ────────────────────────────────────────────────
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Connect ───────────────────────────────────────────────
  function connect() {
    socket = io();

    socket.on('joined', (data) => {
      myId = data.id;
      worldW = data.worldW;
      worldH = data.worldH;
      menu.classList.add('hidden');
      deathScreen.classList.remove('show');
      playing = true;
    });

    socket.on('state', (s) => {
      if (s.worldW) worldW = s.worldW;
      if (s.worldH) worldH = s.worldH;

      // Decode players
      const decoded = {};
      for (const [id, p] of Object.entries(s.players)) {
        const segs = p.s.map(seg => Array.isArray(seg) ? { x: seg[0], y: seg[1] } : seg);
        decoded[id] = {
          id: p.id,
          name: p.n,
          segments: segs,
          score: p.sc,
          hue: p.h,
          boosting: p.b,
          lives: p.l
        };
      }

      // Decode food
      const decodedFood = s.food.map(f => ({
        x: f.x, y: f.y, color: f.c, value: f.v
      }));

      // Decode leaderboard
      const decodedLb = (s.leaderboard || []).map(e => ({
        name: e.n, score: e.sc
      }));

      // Shift: current becomes previous
      prevState = state;
      prevStateTime = stateTime;
      stateTime = performance.now();

      state = {
        players: decoded,
        food: decodedFood,
        leaderboard: decodedLb
      };
    });

    socket.on('dead', (data) => {
      playing = false;
      deathMsg.textContent = data.killer ? `Killed by ${data.killer}` : 'You died!';
      finalScoreEl.textContent = lastScore;

      if (data.eliminated) {
        // No more lives — spectator mode
        myLives = 0;
        deathTitle.textContent = 'ELIMINATED';
        livesInfo.textContent = 'No lives remaining';
        respawnBtn.classList.add('hidden');
        deathScreen.classList.add('show');
        setTimeout(() => {
          deathScreen.classList.remove('show');
          spectating = true;
          spectatorBanner.classList.add('show');
          livesHud.textContent = '';
        }, 3000);
      } else {
        // Still have lives left
        myLives = data.livesLeft;
        deathTitle.textContent = 'YOU DIED';
        livesInfo.textContent = `${data.livesLeft} life remaining`;
        respawnBtn.classList.remove('hidden');
        deathScreen.classList.add('show');
      }
    });

    socket.on('eliminated', () => {
      // Tried to respawn but already out of lives
      spectating = true;
      spectatorBanner.classList.add('show');
      deathScreen.classList.remove('show');
    });

    socket.on('full', () => {
      alert('Server is full! Try again later.');
    });

    socket.on('gameOver', (data) => {
      playing = false;
      spectating = false;
      deathScreen.classList.remove('show');
      spectatorBanner.classList.remove('show');

      const top3 = data.top3 || [];
      const els = [
        { name: p1name, score: p1score, avatar: p1avatar },
        { name: p2name, score: p2score, avatar: p2avatar },
        { name: p3name, score: p3score, avatar: p3avatar }
      ];
      for (let i = 0; i < 3; i++) {
        if (top3[i]) {
          els[i].name.textContent = top3[i].n;
          els[i].score.textContent = top3[i].sc + ' pts';
          els[i].avatar.style.background = `hsl(${top3[i].h}, 70%, 50%)`;
        } else {
          els[i].name.textContent = '---';
          els[i].score.textContent = '';
          els[i].avatar.style.background = '#333';
        }
      }
      podiumScreen.classList.add('show');
    });

    socket.on('timeLeft', (seconds) => {
      const min = Math.floor(seconds / 60);
      const sec = String(seconds % 60).padStart(2, '0');
      timerHud.textContent = `${min}:${sec}`;
      if (seconds <= 60) timerHud.classList.add('warning');
      else timerHud.classList.remove('warning');
    });
  }

  // ── Menu actions ──────────────────────────────────────────
  playBtn.addEventListener('click', startGame);
  nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startGame(); });
  respawnBtn.addEventListener('click', () => {
    socket.emit('respawn', { name: nameInput.value || 'Player' });
  });

  function startGame() {
    if (!socket) connect();
    socket.emit('join', { name: nameInput.value || 'Player' });
  }

  // ── Input (classic slither.io style) ──────────────────────
  const TURN_SPEED = 0.14;
  let keysDown = {};

  // Helper: check if user is typing in a text input
  function isTyping() {
    const el = document.activeElement;
    return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
  }

  // Mouse: cursor is always visible, snake aims toward it
  // This is exactly how slither.io works
  window.addEventListener('mousemove', (e) => {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    mouseAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
  });

  // Keyboard
  window.addEventListener('keydown', (e) => {
    if (isTyping()) return;
    keysDown[e.code] = true;
    if (e.code === 'Space') { boosting = true; e.preventDefault(); }
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' ||
        e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
        e.code === 'KeyA' || e.code === 'KeyD') {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (isTyping()) return;
    keysDown[e.code] = false;
    if (e.code === 'Space') boosting = false;
  });

  // send input to server
  setInterval(() => {
    // Keyboard turning overrides mouse when arrow keys are held
    if (keysDown['ArrowLeft'] || keysDown['KeyA']) mouseAngle -= TURN_SPEED;
    if (keysDown['ArrowRight'] || keysDown['KeyD']) mouseAngle += TURN_SPEED;

    if (socket && playing) {
      socket.emit('input', { angle: mouseAngle, boosting });
    }
  }, 1000 / 30);

  // ── Drawing helpers ───────────────────────────────────────
  function worldToScreen(wx, wy) {
    return { x: wx - camera.x + canvas.width / 2, y: wy - camera.y + canvas.height / 2 };
  }

  // ── Pre-computed values for performance ────────────────────
  const PI2 = Math.PI * 2;
  const halfW = () => canvas.width / 2;
  const halfH = () => canvas.height / 2;

  // Cache HSL color strings to avoid generating them every frame
  const colorCache = {};
  function hsl(h, s, l) {
    const key = (h | 0) * 10000 + (s | 0) * 100 + (l | 0);
    if (!colorCache[key]) colorCache[key] = `hsl(${h},${s}%,${l}%)`;
    return colorCache[key];
  }

  function drawGrid() {
    const gridSize = 60;
    const camX = camera.x, camY = camera.y;
    const w = canvas.width, h = canvas.height;
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    // Batch all grid lines into one path
    ctx.beginPath();
    const sx = -(camX % gridSize);
    const sy = -(camY % gridSize);
    for (let x = sx; x < w; x += gridSize) {
      ctx.moveTo(x, 0); ctx.lineTo(x, h);
    }
    for (let y = sy; y < h; y += gridSize) {
      ctx.moveTo(0, y); ctx.lineTo(w, y);
    }
    ctx.stroke();
  }

  function drawBorder() {
    ctx.strokeStyle = 'rgba(255,50,50,0.4)';
    ctx.lineWidth = 4;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    ctx.strokeRect(ox, oy, worldW, worldH);
  }

  function drawFood() {
    const w = canvas.width, h = canvas.height;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    // Group food by color to minimize fillStyle changes
    const byColor = {};
    for (let i = 0; i < state.food.length; i++) {
      const f = state.food[i];
      const sx = f.x + ox;
      const sy = f.y + oy;
      if (sx < -10 || sx > w + 10 || sy < -10 || sy > h + 10) continue;
      if (!byColor[f.color]) byColor[f.color] = [];
      byColor[f.color].push(sx, sy, f.value > 1 ? 5 : 3);
    }
    for (const color in byColor) {
      ctx.fillStyle = color;
      ctx.beginPath();
      const arr = byColor[color];
      for (let i = 0; i < arr.length; i += 3) {
        ctx.moveTo(arr[i] + arr[i + 2], arr[i + 1]);
        ctx.arc(arr[i], arr[i + 1], arr[i + 2], 0, PI2);
      }
      ctx.fill();
    }
  }

  function drawSnake(p, isMe) {
    const segments = p.segments;
    if (!segments || segments.length < 2) return;
    const radius = 10 + Math.sqrt(p.score) * 1.2;
    const w = canvas.width, h = canvas.height;
    const ox = -camera.x + halfW();
    const oy = -camera.y + halfH();
    const sat = p.boosting ? 100 : 75;
    const hue = p.hue;
    const hue2 = (hue + 30) % 360;
    const len = segments.length;
    const invLen = 1 / len;

    // Draw body — batch segments by color (main + stripe)
    // Main body pass
    ctx.beginPath();
    let lastColor = '';
    for (let i = len - 1; i >= 0; i--) {
      const sx = segments[i].x + ox;
      const sy = segments[i].y + oy;
      if (sx < -radius * 2 || sx > w + radius * 2 ||
          sy < -radius * 2 || sy > h + radius * 2) continue;
      const t = 1 - i * invLen;
      const r = radius * (0.5 + t * 0.5);
      const light = 50 + t * 15;
      const c = hsl(hue, sat, light);
      if (c !== lastColor) {
        if (lastColor) ctx.fill();
        ctx.fillStyle = c;
        ctx.beginPath();
        lastColor = c;
      }
      ctx.moveTo(sx + r, sy);
      ctx.arc(sx, sy, r, 0, PI2);
    }
    ctx.fill();

    // Stripe pass (every other group of 3)
    ctx.beginPath();
    lastColor = '';
    for (let i = len - 1; i >= 0; i--) {
      if (i % 6 >= 3) continue;
      const sx = segments[i].x + ox;
      const sy = segments[i].y + oy;
      if (sx < -radius * 2 || sx > w + radius * 2 ||
          sy < -radius * 2 || sy > h + radius * 2) continue;
      const t = 1 - i * invLen;
      const r = radius * (0.5 + t * 0.5) * 0.7;
      const light = 60 + t * 15;
      const c = hsl(hue2, sat, light);
      if (c !== lastColor) {
        if (lastColor) ctx.fill();
        ctx.fillStyle = c;
        ctx.beginPath();
        lastColor = c;
      }
      ctx.moveTo(sx + r, sy);
      ctx.arc(sx, sy, r, 0, PI2);
    }
    ctx.fill();

    // Eyes on head
    const hx = segments[0].x + ox;
    const hy = segments[0].y + oy;
    const angle = Math.atan2(segments[0].y - segments[1].y, segments[0].x - segments[1].x);
    const eo = radius * 0.4;
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const ex1 = hx + Math.cos(angle - 0.5) * eo;
    const ey1 = hy + Math.sin(angle - 0.5) * eo;
    const ex2 = hx + Math.cos(angle + 0.5) * eo;
    const ey2 = hy + Math.sin(angle + 0.5) * eo;
    ctx.moveTo(ex1 + radius * 0.25, ey1);
    ctx.arc(ex1, ey1, radius * 0.25, 0, PI2);
    ctx.moveTo(ex2 + radius * 0.25, ey2);
    ctx.arc(ex2, ey2, radius * 0.25, 0, PI2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    const po = radius * 0.08;
    ctx.arc(ex1 + cosA * po, ey1 + sinA * po, radius * 0.13, 0, PI2);
    ctx.moveTo(ex2 + cosA * po + radius * 0.13, ey2 + sinA * po);
    ctx.arc(ex2 + cosA * po, ey2 + sinA * po, radius * 0.13, 0, PI2);
    ctx.fill();

    // Name tag
    ctx.font = '600 13px "Segoe UI",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = isMe ? '#ffa502' : 'rgba(255,255,255,0.7)';
    ctx.fillText(p.name, hx, hy - radius - 14);
  }

  // Minimap: only redraw every 3rd frame
  let mmFrame = 0;
  function drawMinimap() {
    mmFrame++;
    if (mmFrame % 3 !== 0) return;
    mmCtx.clearRect(0, 0, 140, 140);
    mmCtx.fillStyle = 'rgba(10,10,30,0.4)';
    mmCtx.fillRect(0, 0, 140, 140);
    mmCtx.strokeStyle = 'rgba(255,50,50,0.3)';
    mmCtx.strokeRect(0, 0, 140, 140);

    // players only (skip food on minimap — saves cycles)
    for (const p of Object.values(renderPlayers)) {
      if (!p.segments || !p.segments.length) continue;
      const mx = p.segments[0].x / worldW * 140;
      const my = p.segments[0].y / worldH * 140;
      mmCtx.beginPath();
      mmCtx.arc(mx, my, p.id === myId ? 3 : 2, 0, PI2);
      mmCtx.fillStyle = p.id === myId ? '#ffa502' : hsl(p.hue, 70, 60);
      mmCtx.fill();
    }
  }

  function updateHUD() {
    const me = state.players[myId];
    if (me) {
      lastScore = me.score;
      myScoreEl.textContent = `Score: ${me.score}`;
      livesHud.textContent = `Lives: ${'♥'.repeat(me.lives || 0)}${'♡'.repeat(2 - (me.lives || 0))}`;
    } else if (spectating) {
      myScoreEl.textContent = '';
      livesHud.textContent = '';
    }

    // leaderboard
    let html = '';
    (state.leaderboard || []).forEach((entry, i) => {
      const isMe = me && entry.name === me.name && entry.score === me.score;
      html += `<div class="lb-row${isMe ? ' me' : ''}">`
            + `<span>${i + 1}. ${entry.name}</span><span>${entry.score}</span></div>`;
    });
    lbBody.innerHTML = html;

    // player count
    const count = Object.keys(state.players).length;
    playerCountEl.textContent = `${count} player${count !== 1 ? 's' : ''} online`;
  }

  // ── Interpolation ─────────────────────────────────────────
  // Lerp between previous and current server snapshots so movement
  // looks smooth even though we only get 10 updates/sec from server
  function lerp(a, b, t) { return a + (b - a) * t; }

  function interpolatePlayers(now) {
    const duration = stateTime - prevStateTime;
    // How far we are between prevState and state (0..1, can overshoot)
    let t = duration > 0 ? (now - stateTime) / duration : 1;
    t = Math.min(Math.max(t, 0), 1.5); // allow slight overshoot for smoothness

    renderPlayers = {};
    for (const [id, curr] of Object.entries(state.players)) {
      const prev = prevState.players && prevState.players[id];
      if (!prev || !prev.segments || prev.segments.length === 0) {
        // New player or no previous data — use current position as-is
        renderPlayers[id] = curr;
        continue;
      }

      // Interpolate each segment
      const segCount = Math.min(prev.segments.length, curr.segments.length);
      const interpSegs = [];
      for (let i = 0; i < curr.segments.length; i++) {
        if (i < prev.segments.length) {
          interpSegs.push({
            x: lerp(prev.segments[i].x, curr.segments[i].x, t),
            y: lerp(prev.segments[i].y, curr.segments[i].y, t)
          });
        } else {
          interpSegs.push(curr.segments[i]);
        }
      }

      renderPlayers[id] = {
        id: curr.id,
        name: curr.name,
        segments: interpSegs,
        score: curr.score,
        hue: curr.hue,
        boosting: curr.boosting,
        lives: curr.lives
      };
    }
  }

  // ── Main render loop ─────────────────────────────────────
  let frameCount = 0;
  function render() {
    frameCount++;
    const now = performance.now();

    // Interpolate player positions for smooth rendering
    interpolatePlayers(now);

    // Background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Camera follow — use interpolated positions
    let camTarget = renderPlayers[myId];
    if (!camTarget && spectating) {
      const ids = Object.keys(renderPlayers);
      if (ids.length > 0) {
        let best = renderPlayers[ids[0]];
        for (const id of ids) {
          if (renderPlayers[id].score > best.score) best = renderPlayers[id];
        }
        camTarget = best;
      }
    }
    if (camTarget && camTarget.segments && camTarget.segments.length > 0) {
      camera.x += (camTarget.segments[0].x - camera.x) * 0.15;
      camera.y += (camTarget.segments[0].y - camera.y) * 0.15;
    }

    drawGrid();
    drawBorder();
    drawFood();

    // Draw other snakes first, then me on top — using interpolated data
    for (const p of Object.values(renderPlayers)) {
      if (p.id !== myId) drawSnake(p, false);
    }
    if (renderPlayers[myId]) drawSnake(renderPlayers[myId], true);

    drawMinimap();
    if (frameCount % 5 === 0) updateHUD();

    requestAnimationFrame(render);
  }
  render();

  // Focus name input
  nameInput.focus();
})();
</script>
</body>
</html>
